<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>kalkulator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="kontainer">
      <h1>calculator</h1>
      <h2>Blop calculator</h2>
      <div id="hasil" class="hasil">0</div>
      <div id="angka" class="kontainer-angka">
        <button value="1" class="angka">1</button>
        <button value="2" class="angka">2</button>
        <button value="3" class="angka">3</button>
        <button value="4" class="angka">4</button>
        <button value="5" class="angka">5</button>
        <button value="6" class="angka">6</button>
        <button value="7" class="angka">7</button>
        <button value="8" class="angka">8</button>
        <button value="9" class="angka">9</button>
        <button value="0" class="angka">0</button>
      </div>
      <div id="operator" class="kontainer-operator">
        <button value="+" class="operator">+</button>
        <button value="-" class="operator">-</button>
        <button value="*" class="operator">*</button>
        <button value="/" class="operator">/</button>
        <button value="=" class="operator">=</button>
        <button value="c" class="operator">Clear</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
